name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.24'
        cache: true

    - name: Tidy dependencies
      run: go mod tidy

    - name: Run Tests
      run: go test -v -race ./...

    - name: Verify Builds
      run: |
        go build -o /dev/null ./atlas/cmd/atlas-proxy
        go build -o /dev/null ./atlas/cmd/atlas-bench
        go build -o /dev/null ./atlas/cmd/static-bench
        go build -o /dev/null ./atlas/cmd/ablation-bench
        go build -o /dev/null ./atlas/cmd/adaptive-bench
        go build -o /dev/null ./atlas/cmd/live-validation
