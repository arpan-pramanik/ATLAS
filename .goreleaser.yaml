project_name: atlas

before:
  hooks:
    - go mod tidy

builds:
  - id: "atlas-proxy"
    main: ./atlas/cmd/atlas-proxy/main.go
    binary: atlas-proxy
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64

archives:
  - format: tar.gz
    name_template: >-
      {{ .ProjectName }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
      {{- if .Arm }}v{{ .Arm }}{{ end }}
    format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: 'checksums.txt'

snapshot:
  name_template: "{{ incpatch .Version }}-next"

release:
  replace_existing_draft: true
  replace_existing_artifacts: true

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
